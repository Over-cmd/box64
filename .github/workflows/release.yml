name: Custom build Box64 for Winlator

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform name'
        required: true
        default: 'T618'
        type: choice
        options:
        - T618
        - X64
        - GENERIC_ARM
        - PHYTIUM
        - RK3326
        - RK3399
        - RK3588
        - RPI4ARM64
        - RPI5ARM64
        - SD845
        - SD888
        - ADLINK
        - TEGRAX1
        - ARM64
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
        - RelWithDebInfo
        - Release
        - Debug
        - MinSizeRel
      dynarec:
        description: 'Enable dynarec'
        required: false
        default: 'true'
        type: boolean
      trace:
        description: 'Enable trace'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Box64 Repository"
        uses: actions/checkout@v4

      - name: "Environment preparation"
        run: |
          sudo apt-get update
          sudo apt-get -y install git gcc-aarch64-linux-gnu cmake make python3 tar zstd
          
          if [[ ${{ github.event.inputs.platform }} == 'T618' ]]; then
            echo "BOX64_PLATFORM_MARCRO=-DARM64=1" >> $GITHUB_ENV
            echo "BOX64_COMPILER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          elif [[ ${{ github.event.inputs.platform }} != 'X64' && ${{ github.event.inputs.platform }} != 'GENERIC_ARM' ]]; then
            echo "BOX64_PLATFORM_MARCRO=-D${{ github.event.inputs.platform }}=1" >> $GITHUB_ENV
            echo "BOX64_COMPILER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          else
            if [[ ${{ github.event.inputs.platform }} == 'X64' ]]; then
              echo "BOX64_PLATFORM_MARCRO=-DLD80BITS=1 -DNOALIGN=1" >> $GITHUB_ENV
              echo "BOX64_COMPILER=gcc" >> $GITHUB_ENV
            else
              echo BOX64_PLATFORM_MARCRO="-DARM_DYNAREC=ON" >> $GITHUB_ENV
              echo "BOX64_COMPILER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            fi
          fi

      - name: "Display Build info"
        run: |
          echo "CMake Platform Macro: ${{ env.BOX64_PLATFORM_MARCRO }}"
          echo "CMake C Compiler: ${{ env.BOX64_COMPILER }}"
          echo "Build type: ${{ github.event.inputs.build_type }}"
          echo "Dynarec Enabled: ${{ github.event.inputs.dynarec }}"
          echo "Trace Enabled: ${{ github.event.inputs.trace }}"

      - name: "Build Box64"
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_C_COMPILER=${{ env.BOX64_COMPILER }} ${{ env.BOX64_PLATFORM_MARCRO }}\
                   -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }}\
                   -DARM_DYNAREC:BOOL=${{ github.event.inputs.dynarec }}\
                   -DHAVE_TRACE:BOOL=${{ github.event.inputs.trace }}\
                   -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          make -j$(nproc) VERBOSE=1

      - name: "Generate Winlator Package Structure"
        run: |
          mkdir -p package_flat
          cp build/box64 package_flat/box64
          
          # Creación del profile.json optimizado para BCN Layer por Compute Shaders
          cat << 'EOF' > package_flat/profile.json
          {
            "type": "Box64",
            "versionName": "t618",
            "versionCode": 0,
            "description": "Box64 t618 Release.",
            "env": {
              "BOX64_DYNAREC": "1",
              "BOX64_DYNAREC_WEAKBARRIER": "1",
              "BOX64_DYNAREC_FASTNAN": "1",
              "BOX64_DYNAREC_SAFEFLAGS": "1",
              "ENABLE_BCN_LAYER": "1",
              "BCN_USE_COMPUTE": "1",
              "DXVK_ASYNC": "1",
              "VK_ICD_FILENAMES": "/system/vendor/etc/vulkan/icd.d/mali.json",
              "BOX64_WAITID": "1"
            },
            "files": [
              {
                "source": "box64",
                "target": "${bindir}/box64"
              }       
            ]
          }
          EOF

      - name: "Compile into .wcp Package (Zstandard Flat Format)"
        run: |
          cd package_flat
          tar --zstd -cf ../box64-t618.wcp profile.json box64
          
      - name: "Upload WCP Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: box64-t618-winlator-zst
          path: box64-t618.wcp
