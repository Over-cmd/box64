name: Compilar Box64 Pipetto Nativo Chroot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu fork de Box64 de Pipetto-crypto
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalar Ninja y herramientas globales
      - name: Instalar Herramientas de Compilación Globales
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # 3. PARCHE GLOBAL DE CÓDIGO: Comentar el pragma FENV en todo el código fuente
      - name: Aplicar Parche de Compatibilidad FENV Global
        run: |
          echo "Buscando y comentando directivas FENV_ACCESS en el repositorio..."
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/#pragma STDC FENV_ACCESS ON/\/\/ #pragma STDC FENV_ACCESS ON/g' {} +
          echo "¡Parche global aplicado con éxito!"

      # 4. CONFIGURACIÓN Y COMPILACIÓN CON EL ANDROID NDK COMPATIBLE DEL SISTEMA
      - name: Configurar y Compilar Box64 con CMake y Ninja
        run: |
          REAL_NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | head -n 1)
          echo "Usando Android NDK oficial en la ruta: $REAL_NDK"
          
          export CC=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
          export CXX=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++
          export ASM=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
          
          mkdir -p build && cd build
          cmake .. \
            -G "Ninja" \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$REAL_NDK \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID=ON \
            -DLINUX=OFF \
            -DARM_DYNAREC=ON \
            -DARCH64=ON \
            -DARM_CPU=cortex-a75 \
            -DCMAKE_CXX_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
            -DCMAKE_C_FLAGS="-O3 -fno-trapping-math -ffinite-math-only"
          
          cmake --build . --parallel $(nproc)

      # 5. PARCHE CHROOT: Comprimir el binario individualmente en gzip y renombrarlo a .wcp
      - name: Generar Archivo WCP Puro Chroot
        run: |
          # Extraemos el binario ejecutable final y le otorgamos permisos máximos chroot (777)
          cp build/box64 ./box64
          chmod 777 ./box64
          
          # Comprimimos sin guardar nombres ni marcas de tiempo originales (-n) para evitar cabeceras extras
          gzip -n -9 ./box64
          
          # Cambiamos el formato de salida directamente a box64.wcp sin carpetas ni json
          mv ./box64.gz ./box64.wcp
          echo "¡Archivo box64.wcp chroot individual generado con éxito!"

      # 6. PUBLICACIÓN DIRECTA EN RELEASES CON EL ARCHIVO .WCP COMPATIBLE
      - name: Publicar archivo box64.wcp en Releases de forma Nativa
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "Creando Release oficial nativa en el servidor bajo el tag: $TAG_NAME"
          
          gh release create "$TAG_NAME" \
            --title "Box64 T618 Chroot WCP (Build #${{ github.run_number }})" \
            --notes "Archivo box64.wcp puro sin manifest y sin carpetas optimizado para el chroot de Winlator Steven-MXZ." \
            box64.wcp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
