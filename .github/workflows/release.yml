name: Custom build Box64 for Winlator

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
        - RelWithDebInfo
        - Release
        - Debug
        - MinSizeRel
      dynarec:
        description: 'Enable dynarec'
        required: false
        default: 'true'
        type: boolean
      trace:
        description: 'Enable trace'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Box64 Repository"
        uses: actions/checkout@v4

      - name: "Environment preparation"
        run: |
          sudo apt-get update
          sudo apt-get -y install git gcc-aarch64-linux-gnu cmake make python3 tar zstd dos2unix

      # PARCHE GLOBAL DE CÓDIGO: Comentar el pragma FENV en todo el código fuente de Pipetto-crypto para permitir optimizaciones
      - name: "Apply Global FENV Compatibility Patch"
        run: |
          echo "Buscando y comentando directivas FENV_ACCESS en el repositorio..."
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/#pragma STDC FENV_ACCESS ON/\/\/ #pragma STDC FENV_ACCESS ON/g' {} +
          echo "¡Parche global aplicado con éxito!"

      - name: "Build Box64"
        run: |
          mkdir build
          cd build
          # Configuración nativa forzada para el chip Unisoc T618 usando el compilador cruzado ARM64 y el hash SysV de Android
          cmake .. -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
                   -DARM64=1 \
                   -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }}\
                   -DARM_DYNAREC:BOOL=${{ github.event.inputs.dynarec || 'true' }}\
                   -DHAVE_TRACE:BOOL=${{ github.event.inputs.trace || 'false' }}\
                   -DCMAKE_C_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
                   -DCMAKE_CXX_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
                   -DCMAKE_EXE_LINKER_FLAGS="-Wl,--hash-style=sysv" \
                   -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          make -j$(nproc) VERBOSE=1

      - name: "Generate Winlator Package Structure"
        run: |
          mkdir -p package_flat
          cp build/box64 package_flat/box64
          chmod +x package_flat/box64
          
          # Inyectamos tu estructura oficial exacta mapeando las variables de tu bcn_layer por Compute Shaders
          cat << 'EOF' > package_flat/profile.json
          {
            "type": "Box64",
            "versionName": "t618-fastmath",
            "versionCode": 1,
            "description": "Box64 T618 optimizado con ffast-math y soporte BCN Compute Shaders.",
            "env": {
              "BOX64_DYNAREC": "1",
              "BOX64_DYNAREC_SAFEFLAGS": "1",
              "BOX64_DYNAREC_BIGBLOCK": "1",
              "ENABLE_BCN_LAYER": "1",
              "BCN_USE_COMPUTE": "1",
              "BCN_COMPUTE_AUTO": "1",
              "BCN_COMPUTE_IMAGE_VIEW": "1",
              "DXVK_ASYNC": "1"
            },
            "files": [
              {
                "source": "box64",
                "target": "${bindir}/box64"
              }       
            ]
          }
          EOF
          
          # Forzar codificación Unix (LF) para evitar rechazos en el instalador de Android
          dos2unix package_flat/profile.json

      - name: "Compile into .wcp Package (Zstandard Flat Format)"
        run: |
          cd package_flat
          # Empaquetamos profile.json y box64 sueltos en la raíz usando el formato Zstandard compatible
          tar --zstd -cf ../box64_t618_wcp.wcp profile.json box64
          cd ..

      # PUBLICACIÓN ULTRA ROBUSTA EN RELEASES: Sube el archivo .wcp directamente a tu cuenta de GitHub
      - name: "Publish .WCP Package directly to Releases"
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "Creando Release oficial nativa en el servidor bajo el tag: $TAG_NAME"
          
          gh release create "$TAG_NAME" \
            --title "Box64 Pipetto T618 WCP (Build #${{ github.run_number }})" \
            --notes "Box64 Dynarec del repositorio de Pipetto-crypto empaquetado en perfil WCP oficial con soporte BCN Layer activo." \
            box64_t618_wcp.wcp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
