name: Compilar Box64 WCP para Unisoc T618
on:
  workflow_dispatch:

jobs:
  build-android-bionic:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar e Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 ninja-build zip

      - name: Configurar NDK de Android
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653'

      - name: Configurar CMake e Inyectar Toolchain del NDK
        # Forzamos el uso de Clang del NDK para resolver los conflictos de librerías de señales
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DCMAKE_C_COMPILER=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DARM64=1 \
            -DLD80BITS=1 \
            -DNO_MUTEX_LOG=1 \
            -DCMAKE_C_FLAGS="-O3 -march=armv8-a+crc+crypto -mtune=cortex-a75" \
            -G Ninja

      - name: Compilar Binario Box64
        run: |
          cd build
          ninja

      - name: Empaquetar en Formato WCP (Estructura Limpia Raíz)
        # Estructuramos el binario y el manifiesto directamente en la raíz del archivo comprimido
        run: |
          mkdir -p wcp_content/bin
          cp build/box64 wcp_content/bin/
          
          # Manifiesto JSON con los metadatos exactos de tu perfil de hardware
          echo '{"name": "Box64 Unisoc T618 Mali-G52", "version": "Custom-Mali-Vulkan", "architectures": ["arm64"]}' > wcp_content/metadata.json
          
          # Entramos a la carpeta para comprimir los elementos sueltos
          cd wcp_content
          zip -r ../box64-t618-bionic.wcp .

      - name: Guardar Archivo Compilado (.WCP Directo)
        uses: actions/upload-artifact@v4
        with:
          name: box64-t618-bionic.wcp
          path: box64-t618-bionic.wcp
          # Evitamos que GitHub empaquete el archivo dentro de otro ZIP redundante
          compression-level: 0
