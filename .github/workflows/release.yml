name: Compilar Box64 Nativo de Contenedor para Unisoc T618
on:
  workflow_dispatch:

jobs:
  build-linux-container:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar e Instalar Herramientas de Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu zip

      - name: Configurar CMake para el Entorno del Contenedor
        # Usamos el compilador cruzado de Linux y activamos -DTERMUX=1 para saltarnos el error de las señales y threads
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DARM64=1 \
            -DLD80BITS=1 \
            -DNO_MUTEX_LOG=1 \
            -DTERMUX=1 \
            -DCMAKE_C_FLAGS="-O3 -march=armv8-a+crc+crypto -mtune=cortex-a75" \
            -G Ninja

      - name: Compilar Binario Box64
        run: |
          cd build
          ninja

      - name: Empaquetar solo el Binario Suelto
        run: |
          mkdir -p contenedor_plano
          cp build/box64 contenedor_plano/
          cd contenedor_plano
          zip -r ../box64-contenedor-t618.wcp box64

      - name: Guardar Archivo Compilado (.WCP Plano)
        uses: actions/upload-artifact@v4
        with:
          name: box64-contenedor-t618.wcp
          path: box64-contenedor-t618.wcp
          compression-level: 0
