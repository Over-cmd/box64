name: Compilar Box64 Nativo y Publicar WCP Directo

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu nuevo fork de Box64
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalar Ninja, dos2unix y utilidades estándar
      - name: Instalar Herramientas de Compilación Globales
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build dos2unix

      # 3. Configurar Android SDK y NDK oficiales estables de GitHub
      - name: Configurar Android SDK y NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      # 4. PARCHE GLOBAL DE CÓDIGO: Comentar el pragma FENV en todo el código fuente
      - name: Aplicar Parche de Compatibilidad FENV Global
        run: |
          echo "Buscando y comentando directivas FENV_ACCESS en el repositorio..."
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/#pragma STDC FENV_ACCESS ON/\/\/ #pragma STDC FENV_ACCESS ON/g' {} +
          echo "¡Parche global aplicado con éxito!"

      # 5. CONFIGURACIÓN Y COMPILACIÓN FORZADA CON EL NDK DE ANDROID
      - name: Configurar y Compilar Box64 con CMake y Ninja
        run: |
          # Ubicar el NDK configurado en el paso anterior
          REAL_NDK=$ANDROID_NDK_HOME
          echo "Usando Android NDK oficial en la ruta: $REAL_NDK"
          
          export CC=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
          export CXX=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++
          export ASM=$REAL_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang
          
          mkdir -p build && cd build
          cmake .. \
            -G "Ninja" \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$REAL_NDK \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID=ON \
            -DLINUX=OFF \
            -DARM_DYNAREC=ON \
            -DARCH64=ON \
            -DARM_CPU=cortex-a75 \
            -DCMAKE_CXX_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
            -DCMAKE_C_FLAGS="-O3 -fno-trapping-math -ffinite-math-only"
          
          cmake --build . --parallel $(nproc)

      # 6. ESTRUCTURAR EL PAQUETE .WCP CON EL MANIFIESTO OFICIAL PARA WINLATOR BIONIC
      - name: Estructurar Paquete WCP Nativo Plano
        run: |
          mkdir -p wcp_package
          
          # Copiar el binario ejecutable final y otorgar permisos
          cp build/box64 wcp_package/box64
          chmod 777 wcp_package/box64

          # Generar la firma manifest.json requerida por el instalador de Winlator Bionic
          cat << 'EOF' > wcp_package/manifest.json
          {
            "id": "box64",
            "name": "Box64 T618 FastMath",
            "type": "box64",
            "version": "1.0",
            "author": "Over-cmd",
            "description": "Box64 optimizado para Unisoc Tiger T618",
            "exec": "box64",
            "install_path": "box64"
          }
          EOF

          # Asegurar formato Unix (LF) puro en el manifest.json
          dos2unix wcp_package/manifest.json
          
          # Compresión Tar+Gz empaquetada como .wcp (Estándar nativo de Winlator Bionic)
          cd wcp_package
          tar -czf ../box64_t618_wcp.wcp box64 manifest.json
          cd ..

    # 7. PUBLICACIÓN DIRECTA EN RELEASES CON EL ARCHIVO .WCP COMPATIBLE
    - name: Publicar archivo .WCP en Releases de forma Nativa
      run: |
        TAG_NAME="v1.0.${{ github.run_number }}"
        echo "Creando Release oficial nativa en el servidor bajo el tag: $TAG_NAME"
        
        gh release create "$TAG_NAME" \
          --title "Box64 Pipetto Unisoc T618 WCP (Build #${{ github.run_number }})" \
          --notes "Box64 Dynarec optimizado para CPUs Cortex-A75 y Winlator Bionic con soporte Vulkan 1.1." \
          box64_t618_wcp.wcp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
