name: Custom build Box64 for Winlator

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
        - RelWithDebInfo
        - Release
        - Debug
        - MinSizeRel
      dynarec:
        description: 'Enable dynarec'
        required: false
        default: 'true'
        type: boolean
      trace:
        description: 'Enable trace'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Box64 Repository"
        uses: actions/checkout@v4

      # Instalar Ninja y utilidades globales requeridas para el Toolchain de Android
      - name: "Environment preparation"
        run: |
          sudo apt-get update
          sudo apt-get -y install git ninja-build python3 tar zstd dos2unix

      # Configurar el NDK r25 oficial de Google para inyectar el enlazador de Android (Bionic/BionicC)
      - name: "Configure Android NDK"
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653'

      # PARCHE GLOBAL DE CÓDIGO: Comentar el pragma FENV en todo el código fuente de Pipetto-crypto para evitar errores de compilación
      - name: "Apply Global FENV Compatibility Patch"
        run: |
          echo "Buscando y comentando directivas FENV_ACCESS en el repositorio..."
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/#pragma STDC FENV_ACCESS ON/\/\/ #pragma STDC FENV_ACCESS ON/g' {} +
          echo "¡Parche global aplicado con éxito!"

      # COMPILACIÓN NATIVA PARA ANDROID BIONIC: Forzamos el uso del NDK de Google
      # Esto elimina el crash silencioso que congela el contenedor en 'Starting up'
      - name: "Build Box64 using Android NDK"
        run: |
          mkdir build
          cd build
          cmake .. -G "Ninja" \
                   -DCMAKE_MAKE_PROGRAM=$(which ninja) \
                   -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                   -DANDROID_ABI=arm64-v8a \
                   -DANDROID_PLATFORM=android-29 \
                   -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }}\
                   -DANDROID=ON \
                   -DLINUX=OFF \
                   -DARM_DYNAREC=ON \
                   -DARCH64=ON \
                   -DARM_CPU=cortex-a75 \
                   -DCMAKE_C_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
                   -DCMAKE_CXX_FLAGS="-O3 -fno-trapping-math -ffinite-math-only" \
                   -DCMAKE_EXE_LINKER_FLAGS="-Wl,--hash-style=sysv" \
                   -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          ninja

      - name: "Generate Winlator Package Structure"
        run: |
          mkdir -p package_flat
          cp build/box64 package_flat/box64
          chmod +x package_flat/box64
          
          # Inyectamos el profile con las variables pulidas para evitar bucles infinitos en el inicio del contenedor
          cat << 'EOF' > package_flat/profile.json
          {
            "type": "Box64",
            "versionName": "t618-fastmath",
            "versionCode": 1,
            "description": "Box64 T618 optimizado con NDK Bionic y soporte BCN Compute Shaders.",
            "env": {
              "BOX64_DYNAREC": "1",
              "BOX64_DYNAREC_BIGBLOCK": "1",
              "BOX64_DYNAREC_STRONGMEM": "1",
              "BOX64_DYNAREC_FASTROUND": "1",
              "ENABLE_BCN_LAYER": "1",
              "BCN_USE_COMPUTE": "1",
              "BCN_COMPUTE_AUTO": "1",
              "BCN_COMPUTE_IMAGE_VIEW": "1",
              "DXVK_ASYNC": "1"
            },
            "files": [
              {
                "source": "box64",
                "target": "${bindir}/box64"
              }       
            ]
          }
          EOF
          
          dos2unix package_flat/profile.json

      - name: "Compile into .wcp Package (Zstandard Flat Format)"
        run: |
          cd package_flat
          tar --zstd -cf ../box64_t618_wcp.wcp profile.json box64
          cd ..

      - name: "Publish .WCP Package directly to Releases"
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "Creando Release oficial nativa en el servidor bajo el tag: $TAG_NAME"
          
          gh release create "$TAG_NAME" \
            --title "Box64 Pipetto T618 WCP (Build #${{ github.run_number }})" \
            --notes "Box64 Dynarec compilado de forma nativa con Android NDK para corregir el congelamiento de pantalla." \
            box64_t618_wcp.wcp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
