name: Compilar Box64 WCP para Unisoc T618
on:
  workflow_dispatch:

jobs:
  build-android-bionic:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar e Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 ninja-build zip

      - name: Configurar NDK de Android
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653'

      - name: Configurar CMake e Inyectar Toolchain del NDK
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DARM64=1 \
            -DLD80BITS=1 \
            -DNO_MUTEX_LOG=1 \
            -DCMAKE_C_FLAGS="-O3 -march=armv8-a+crc+crypto -mtune=cortex-a75" \
            -G Ninja

      - name: Compilar Binario Box64
        run: |
          cd build
          ninja

      - name: Limpiar Símbolos de Depuración (Reducir de 26MB a ~4.5MB)
        # Usamos la herramienta llvm-strip del NDK para recortar el peso del binario al mínimo
        run: |
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-all build/box64

      - name: Empaquetar en Formato WCP (Solo Binario Suelto en Raíz)
        run: |
          mkdir -p wcp_plano
          cp build/box64 wcp_plano/
          cd wcp_plano
          zip -r ../box64-t618-bionic.wcp box64

      - name: Guardar Archivo Compilado (.WCP Liviano)
        uses: actions/upload-artifact@v4
        with:
          name: box64-t618-bionic.wcp
          path: box64-t618-bionic.wcp
          compression-level: 0
